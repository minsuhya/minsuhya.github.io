name: AI Code Quality Gate — Layer 1 Static Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs on new pushes to the same PR
concurrency:
  group: quality-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Override these via repository variables (Settings > Variables > Actions)
env:
  COMPLEXITY_LIMIT: ${{ vars.COMPLEXITY_LIMIT || '20' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '70' }}

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Official Gitleaks action — handles install, scanning, and PR comments.
      # Personal accounts: no license key required.
      # Organization accounts: set GITLEAKS_LICENSE secret (free key from gitleaks.io).
      # Docs: https://github.com/gitleaks/gitleaks-action
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  sast-python:
    name: SAST — Python (Bandit + Semgrep + Radon)
    runs-on: ubuntu-latest
    # Only run when Python files exist. Remove this condition for forced runs.
    if: hashFiles('**/*.py') != ''
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install 'bandit>=1.7.10' 'semgrep>=1.50' 'radon>=6.0'

      - name: Detect AI-generated PR flag
        id: ai-flag
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if echo "$BODY" | grep -qiE "ai-generated|copilot|cursor|chatgpt|claude"; then
            echo "ai_generated=true" >> "$GITHUB_OUTPUT"
            echo "::notice::AI-generated PR detected — applying extended ruleset"
          else
            echo "ai_generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bandit security scan (HIGH/HIGH = blocker)
        run: |
          bandit -r . -ll -f json -o bandit-report.json \
            --exclude ".venv,venv,node_modules,tests,.tox,build,dist" || true
          python3 - <<'EOF'
          import json, sys
          try:
              with open('bandit-report.json') as f:
                  report = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"Bandit report not parseable ({e}) — skipping")
              sys.exit(0)
          blockers = [r for r in report.get('results', [])
                      if r['issue_severity'] == 'HIGH' and r['issue_confidence'] == 'HIGH']
          for b in blockers:
              print(f"::error file={b['filename']},line={b['line_number']}::"
                    f"Bandit {b['test_id']} - {b['issue_text']}")
          total = len(report.get('results', []))
          print(f"Bandit summary: {total} findings, {len(blockers)} blockers (HIGH severity + HIGH confidence)")
          sys.exit(1 if blockers else 0)
          EOF

      - name: Semgrep SAST
        env:
          AI_GENERATED: ${{ steps.ai-flag.outputs.ai_generated }}
        run: |
          CONFIGS="--config p/python"
          if [ "$AI_GENERATED" = "true" ]; then
            CONFIGS="--config p/python --config p/security-audit --config p/owasp-top-ten"
          fi
          semgrep $CONFIGS --error --json --output semgrep-report.json \
            --exclude ".venv" --exclude "tests" --exclude "build" . || true
          python3 - <<'EOF'
          import json, sys
          try:
              with open('semgrep-report.json') as f:
                  report = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"Semgrep report not parseable ({e}) — skipping")
              sys.exit(0)
          errors = [r for r in report.get('results', [])
                    if r.get('extra', {}).get('severity') in ('ERROR', 'CRITICAL')]
          for e in errors[:20]:
              path = e.get('path', '?')
              line = e.get('start', {}).get('line', '?')
              msg = e.get('extra', {}).get('message', '')
              print(f"::error file={path},line={line}::Semgrep - {msg}")
          print(f"Semgrep summary: {len(report.get('results', []))} findings, {len(errors)} blocking")
          sys.exit(1 if errors else 0)
          EOF

      - name: Cyclomatic complexity check
        run: |
          radon cc . -s -n C --json --exclude ".venv,tests,build" > complexity-report.json 2>/dev/null \
            || echo "{}" > complexity-report.json
          python3 - <<EOF
          import json, sys, os
          LIMIT = int(os.environ.get('COMPLEXITY_LIMIT', '20'))
          with open('complexity-report.json') as f:
              report = json.load(f)
          violations = []
          for filepath, blocks in report.items():
              for b in blocks:
                  if isinstance(b, dict) and b.get('complexity', 0) > LIMIT:
                      violations.append((filepath, b.get('lineno','?'),
                                         b.get('name','?'), b['complexity']))
          for filepath, lineno, name, cc in violations:
              print(f"::error file={filepath},line={lineno}::"
                    f"Complexity {cc} > limit {LIMIT} in {name}")
          print(f"Complexity gate: {len(violations)} function(s) exceed CC={LIMIT}")
          sys.exit(1 if violations else 0)
          EOF

  coverage-enforcement:
    name: Test Coverage Gate
    runs-on: ubuntu-latest
    if: hashFiles('**/*.py') != '' && hashFiles('tests/**') != ''
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: Run tests with coverage gate
        run: |
          pytest --cov=. --cov-report=json \
            --cov-fail-under=${COVERAGE_THRESHOLD} \
            --ignore=.venv -q

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python3 -c "
          import json, os
          cov = json.load(open('coverage.json'))['totals']['percent_covered']
          threshold = os.environ['COVERAGE_THRESHOLD']
          status = '✅ passed' if cov >= float(threshold) else '❌ FAILED'
          print(f'Coverage: {cov:.1f}% (minimum: {threshold}%) — {status}')
          "
          fi

# ── Configuration via Repository Variables (Settings > Variables > Actions) ──
#
#   COMPLEXITY_LIMIT       — Max cyclomatic complexity per function (default: 20)
#   COVERAGE_THRESHOLD     — Minimum test coverage percentage (default: 70)
#
# ── JavaScript / TypeScript variant ──────────────────────────────────────────
